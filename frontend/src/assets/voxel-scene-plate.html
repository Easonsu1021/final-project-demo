<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Voxel PCB Scene</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        canvas { display: block; }
        #loading {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            color: #4CAF50; font-family: monospace; font-size: 24px;
            pointer-events: none;
        }
    </style>

    <style>
      /* Hides common overlay IDs and classes used in Three.js examples and generated code */
      #info, #loading, #ui, #instructions, .label, .overlay, #description {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
        visibility: hidden !important;
      }
      /* Ensure the body doesn't show selected text cursor interaction outside canvas */
      body {
        user-select: none !important;
      }
    </style>
  </head>
<body>
    <div id="loading">GENERATING CIRCUIT...</div>
    
    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

        // --- CONFIGURATION ---
        const BOARD_SIZE = 60;
        const VOXEL_SIZE = 1;
        const GAP = 0.05; // Gap between voxels for that "blocky" look
        const GRID_SCALE = VOXEL_SIZE + GAP;

        // Palette inspired by the image
        const PALETTE = {
            BOARD:   { color: 0x1f3626, rough: 0.8, metal: 0.1 }, // Dark Green
            CHIP:    { color: 0x333333, rough: 0.5, metal: 0.2 }, // Dark Grey
            PIN:     { color: 0xcccccc, rough: 0.3, metal: 0.8 }, // Silver
            TRACE:   { color: 0xcca448, rough: 0.2, metal: 0.9 }, // Gold/Copper
            CAP:     { color: 0xe8dcb5, rough: 0.4, metal: 0.0 }, // Beige
            BLUE:    { color: 0x6e9ab5, rough: 0.4, metal: 0.1 }, // Blue Components
            LABEL:   { color: 0xffffff, rough: 0.9, metal: 0.0 }  // White text/lines
        };

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a100d); // Very dark green/black bg
        scene.fog = new THREE.Fog(0x0a100d, 50, 150);

        // Isometric view using Orthographic Camera
        const aspect = window.innerWidth / window.innerHeight;
        const d = 40;
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
        camera.position.set(40, 40, 40); // Isometric angle
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(20, 50, 30);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 200;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        scene.add(dirLight);

        // --- VOXEL GENERATION LOGIC ---
        
        // 2D grid to keep track of occupied spaces
        const grid = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
        const voxelData = []; // Stores {x, y, z, type}

        function isFree(x, z, w, h) {
            if (x < 0 || z < 0 || x + w > BOARD_SIZE || z + h > BOARD_SIZE) return false;
            for(let i = x; i < x + w; i++) {
                for(let j = z; j < z + h; j++) {
                    if (grid[i][j] !== 0) return false;
                }
            }
            return true;
        }

        function markOccupied(x, z, w, h, id = 1) {
            for(let i = x; i < x + w; i++) {
                for(let j = z; j < z + h; j++) {
                    grid[i][j] = id;
                }
            }
        }

        // Add a single voxel
        function addVoxel(x, y, z, typeKey) {
            voxelData.push({ x, y, z, type: typeKey });
        }

        // 1. Generate Base Board
        for (let x = 0; x < BOARD_SIZE; x++) {
            for (let z = 0; z < BOARD_SIZE; z++) {
                addVoxel(x, 0, z, 'BOARD');
            }
        }

        // 2. Generate Chips (Large)
        for (let i = 0; i < 5; i++) {
            let w = 6 + Math.floor(Math.random() * 6); // width 6-12
            let h = w; // Square
            let x = Math.floor(Math.random() * (BOARD_SIZE - w));
            let z = Math.floor(Math.random() * (BOARD_SIZE - h));

            if (isFree(x, z, w, h)) {
                markOccupied(x, z, w, h);
                // Draw Chip
                for(let dx = 0; dx < w; dx++) {
                    for(let dz = 0; dz < h; dz++) {
                        // Pins on edges
                        let isEdge = dx === 0 || dx === w - 1 || dz === 0 || dz === h - 1;
                        if (isEdge) {
                             addVoxel(x + dx, 1, z + dz, 'PIN');
                        } else {
                             // Body height
                             addVoxel(x + dx, 1, z + dz, 'CHIP');
                             addVoxel(x + dx, 2, z + dz, 'CHIP');
                        }
                    }
                }
                // Add a label/dot on top
                addVoxel(x + 2, 3, z + 2, 'CHIP'); 
            }
        }

        // 3. Generate Rectangular Logic Chips
        for (let i = 0; i < 15; i++) {
            let w = 3;
            let h = 6 + Math.floor(Math.random() * 4);
            // Random rotation
            if (Math.random() > 0.5) [w, h] = [h, w];

            let x = Math.floor(Math.random() * (BOARD_SIZE - w));
            let z = Math.floor(Math.random() * (BOARD_SIZE - h));

            if (isFree(x, z, w, h)) {
                markOccupied(x, z, w, h);
                for(let dx = 0; dx < w; dx++) {
                    for(let dz = 0; dz < h; dz++) {
                        // Pins on long sides typically, but let's just do perimeter for style
                        let isEdge = dx === 0 || dx === w - 1 || dz === 0 || dz === h - 1;
                        if (isEdge && (dx+dz)%2!==0) { // Alternating pins
                             addVoxel(x + dx, 1, z + dz, 'PIN');
                        } else if (!isEdge) {
                             addVoxel(x + dx, 1, z + dz, 'CHIP');
                        }
                    }
                }
            }
        }

        // 4. Generate Capacitors/Small components (Blue/Beige)
        for (let i = 0; i < 30; i++) {
            let x = Math.floor(Math.random() * (BOARD_SIZE - 2));
            let z = Math.floor(Math.random() * (BOARD_SIZE - 2));
            
            if (isFree(x, z, 2, 1)) {
                markOccupied(x, z, 2, 1);
                let type = Math.random() > 0.5 ? 'CAP' : 'BLUE';
                addVoxel(x, 1, z, 'PIN');
                addVoxel(x + 1, 1, z, 'PIN');
                // The component body floats slightly or sits on pins
                addVoxel(x, 2, z, type);
                addVoxel(x + 1, 2, z, type);
            }
        }

        // 5. Generate Traces (Random Walkers)
        // We look for empty green spaces and turn them into gold traces
        const NUM_WALKERS = 40;
        for(let i=0; i<NUM_WALKERS; i++) {
            let cx = Math.floor(Math.random() * BOARD_SIZE);
            let cz = Math.floor(Math.random() * BOARD_SIZE);
            let dir = Math.floor(Math.random() * 4); // 0:N, 1:E, 2:S, 3:W
            let length = 5 + Math.floor(Math.random() * 20);

            for(let step=0; step<length; step++) {
                if (cx < 0 || cz < 0 || cx >= BOARD_SIZE || cz >= BOARD_SIZE) break;
                
                // If it's empty (0) or already a trace (2), we can draw
                if (grid[cx][cz] === 0) {
                    // We don't change grid to occupied so lines can cross lightly or run parallel
                    // But we push a voxel.
                    // To avoid z-fighting with the board, traces are y=1 but we remove the board below?
                    // Simpler: Traces sit ON TOP of the board (y=1).
                    addVoxel(cx, 1, cz, 'TRACE');
                    grid[cx][cz] = 2; // Mark as trace
                }

                // Move
                if (dir === 0) cz--;
                else if (dir === 1) cx++;
                else if (dir === 2) cz++;
                else if (dir === 3) cx--;

                // Chance to turn
                if (Math.random() < 0.2) {
                    dir = (dir + (Math.random() > 0.5 ? 1 : 3)) % 4;
                }
            }
        }

        // --- MESH CONSTRUCTION ---

        // We use InstancedMesh for performance. One mesh per material type.
        const typeBuckets = {};
        
        // Sort voxels into buckets
        voxelData.forEach(v => {
            if (!typeBuckets[v.type]) typeBuckets[v.type] = [];
            typeBuckets[v.type].push(v);
        });

        // Geometry for all voxels (rounded box looks nicer than sharp cube)
        const geometry = new RoundedBoxGeometry(VOXEL_SIZE, VOXEL_SIZE, VOXEL_SIZE, 2, 0.15);

        const group = new THREE.Group();
        // Center the board
        group.position.set(- (BOARD_SIZE * GRID_SCALE) / 2, 0, - (BOARD_SIZE * GRID_SCALE) / 2);
        scene.add(group);

        const dummy = new THREE.Object3D();

        Object.keys(typeBuckets).forEach(key => {
            const voxels = typeBuckets[key];
            const matProps = PALETTE[key];
            
            const material = new THREE.MeshStandardMaterial({
                color: matProps.color,
                roughness: matProps.rough,
                metalness: matProps.metal,
            });

            const mesh = new THREE.InstancedMesh(geometry, material, voxels.length);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            voxels.forEach((v, i) => {
                dummy.position.set(
                    v.x * GRID_SCALE, 
                    v.y * GRID_SCALE, 
                    v.z * GRID_SCALE
                );
                
                // Add some random height variation for traces/board to add texture
                if (key === 'TRACE') dummy.scale.set(1, 0.2, 1); // Traces are flat
                else if (key === 'BOARD') dummy.scale.set(1, 1, 1);
                else dummy.scale.set(1, 1, 1);

                // For traces, lower them slightly so they sit flush on board
                if (key === 'TRACE') dummy.position.y -= (GRID_SCALE * 0.4);

                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
            });

            group.add(mesh);
        });

        // Hide loader
        document.getElementById('loading').style.display = 'none';

        // --- ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
</body>
</html>
