<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Chipset Scene</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000c1d; }
        canvas { display: block; }
    </style>
    <!-- Import Three.js and OrbitControls as ES Modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <style>
      /* Hides common overlay IDs and classes used in Three.js examples and generated code */
      #info, #loading, #ui, #instructions, .label, .overlay, #description {
        display: none !important;
        opacity: 0 !important;
        pointer-events: none !important;
        visibility: hidden !important;
      }
      /* Ensure the body doesn't show selected text cursor interaction outside canvas */
      body {
        user-select: none !important;
      }
    </style>
  </head>
<body>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Configuration ---
    const VOXEL_SIZE = 1;
    const GAP = 0.05; // Gap between voxels for that "grid" look
    const BOX_SIZE = VOXEL_SIZE - GAP;
    
    // Palette based on the image
    const COLORS = {
        PCB_DARK: 0x1a2b3c,
        PCB_LIGHT: 0x2c4a63,
        CHIP_BLACK: 0x111111,
        HEATSINK_SILVER: 0xddeeff,
        HEATSINK_SHADOW: 0x8899aa,
        PIN_WHITE: 0xffffff,
        PIN_BASE: 0x222222
    };

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x001530); // Deep blue background
    scene.fog = new THREE.Fog(0x001530, 20, 90);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(28, 24, 28);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.0;

    // --- Lighting ---
    const ambientLight = new THREE.AmbientLight(0x406080, 1.5); // Cool ambient
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
    mainLight.position.set(-20, 40, 20);
    mainLight.castShadow = true;
    mainLight.shadow.mapSize.width = 2048;
    mainLight.shadow.mapSize.height = 2048;
    mainLight.shadow.camera.near = 0.5;
    mainLight.shadow.camera.far = 100;
    mainLight.shadow.bias = -0.001;
    // Widen shadow camera
    const d = 30;
    mainLight.shadow.camera.left = -d;
    mainLight.shadow.camera.right = d;
    mainLight.shadow.camera.top = d;
    mainLight.shadow.camera.bottom = -d;
    scene.add(mainLight);

    const blueRimLight = new THREE.DirectionalLight(0x0088ff, 2.0);
    blueRimLight.position.set(20, 10, -20);
    scene.add(blueRimLight);

    // --- Voxel Generation Logic ---

    // We will use a helper class to manage instances
    class VoxelBuilder {
        constructor() {
            this.voxels = [];
        }

        add(x, y, z, colorHex) {
            this.voxels.push({ x, y, z, color: new THREE.Color(colorHex) });
        }

        // Rectangular prism filler
        addBlock(x, y, z, w, h, d, colorHex) {
            for(let i=0; i<w; i++) {
                for(let j=0; j<h; j++) {
                    for(let k=0; k<d; k++) {
                        this.add(x+i, y+j, z+k, colorHex);
                    }
                }
            }
        }

        buildMesh() {
            const geometry = new THREE.BoxGeometry(BOX_SIZE, BOX_SIZE, BOX_SIZE);
            const material = new THREE.MeshStandardMaterial({ 
                roughness: 0.3, 
                metalness: 0.6 
            });
            
            const mesh = new THREE.InstancedMesh(geometry, material, this.voxels.length);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            const dummy = new THREE.Object3D();

            this.voxels.forEach((v, i) => {
                dummy.position.set(v.x * VOXEL_SIZE, v.y * VOXEL_SIZE, v.z * VOXEL_SIZE);
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
                mesh.setColorAt(i, v.color);
            });

            return mesh;
        }
    }

    const builder = new VoxelBuilder();

    // 1. The Base PCB (Centered at 0,0)
    const boardSize = 26;
    const boardHalf = boardSize / 2;
    
    for(let x = -boardHalf; x < boardHalf; x++) {
        for(let z = -boardHalf; z < boardHalf; z++) {
            // Checkered pattern or circuit traces logic
            const isTrace = (Math.abs(x) > 5 && Math.abs(x) < 8) || (Math.abs(z) % 4 === 0);
            const col = isTrace ? COLORS.PCB_LIGHT : COLORS.PCB_DARK;
            builder.add(x, 0, z, col);
        }
    }

    // 2. Central Processing Units (The 4 black blocks)
    // We create 4 blocks
    const chipOffset = 2;
    const chipSize = 6;
    const chipHeight = 3;

    const createChip = (ox, oz) => {
        // Base of chip
        builder.addBlock(ox, 1, oz, chipSize, 1, chipSize, 0x333333);
        // Main body
        builder.addBlock(ox, 2, oz, chipSize, chipHeight, chipSize, COLORS.CHIP_BLACK);
    };

    createChip(chipOffset, chipOffset);
    createChip(-chipOffset - chipSize, chipOffset);
    createChip(chipOffset, -chipOffset - chipSize);
    createChip(-chipOffset - chipSize, -chipOffset - chipSize);


    // 3. Heatsinks (The silver striated blocks)
    // Located at corners and sides
    const createHeatsink = (ox, oz, w, d) => {
        const height = 5;
        for(let y=1; y<=height; y++) {
            // Striped pattern: Silver, Dark, Silver
            const isFin = y % 2 !== 0; 
            const col = isFin ? COLORS.HEATSINK_SILVER : COLORS.HEATSINK_SHADOW;
            
            // If it's a gap layer, maybe we make the block slightly smaller visually? 
            // For voxel art, we usually just change color or omit blocks. 
            // Let's create actual fins by omitting the center of the dark layers or just coloring.
            
            if (isFin) {
                builder.addBlock(ox, y, oz, w, 1, d, col);
            } else {
                // The "inner" darker core
                builder.addBlock(ox + 1, y, oz + 1, w - 2, 1, d - 2, col);
            }
        }
    };

    // Corner Heatsinks
    const hsSize = 5;
    const hsDist = 10;
    createHeatsink(hsDist, hsDist, hsSize, hsSize);
    createHeatsink(-hsDist - hsSize, hsDist, hsSize, hsSize);
    createHeatsink(hsDist, -hsDist - hsSize, hsSize, hsSize);
    createHeatsink(-hsDist - hsSize, -hsDist - hsSize, hsSize, hsSize);

    // Side Heatsinks (Rectangular ones)
    createHeatsink(-3, hsDist + 1, 6, 4); // Top center
    createHeatsink(-3, -hsDist - 4 - 1, 6, 4); // Bottom center
    createHeatsink(hsDist + 1, -3, 4, 6); // Right center
    createHeatsink(-hsDist - 4 - 1, -3, 4, 6); // Left center


    // 4. Connector Pins (The white tubes/cylinders sticking out)
    // In voxel art, these are just lines of small cubes.
    const createPinRow = (startX, startZ, dirX, dirZ, count, length) => {
        for(let i=0; i<count; i++) {
            // The black connector block
            builder.add(startX + (i * dirZ * 2), 1, startZ + (i * dirX * 2), COLORS.PIN_BASE);
            
            // The white pin extending out
            for(let l=1; l<=length; l++) {
                builder.add(
                    startX + (i * dirZ * 2) + (dirX * l), 
                    1, 
                    startZ + (i * dirX * 2) + (dirZ * l), 
                    COLORS.PIN_WHITE
                );
            }
        }
    };

    // Pins extending from the left and right sides of the board
    createPinRow(-boardHalf - 1, -2, -1, 0, 3, 4); // Extending Left
    createPinRow(-boardHalf - 1, -2 + 4, -1, 0, 3, 4); 

    // Add extra details/capacitors (small cubes)
    builder.addBlock(5, 1, 0, 2, 1, 2, 0xaaaaaa);
    builder.addBlock(-7, 1, 0, 2, 1, 2, 0xaaaaaa);
    builder.addBlock(0, 1, 5, 2, 1, 2, 0xaaaaaa);
    builder.addBlock(0, 1, -7, 2, 1, 2, 0xaaaaaa);

    // Build and add to scene
    const voxelMesh = builder.buildMesh();
    // Center the mesh visually
    voxelMesh.position.y = -2;
    scene.add(voxelMesh);

    // --- Animation Loop ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        const time = clock.getElapsedTime();
        
        // Gentle floating effect
        voxelMesh.position.y = -2 + Math.sin(time * 0.5) * 0.5;
        
        // Update controls
        controls.update();
        
        renderer.render(scene, camera);
    }

    // Handle Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();

</script>
</body>
</html>
